<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIFF Debug</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      line-height: 1.5;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
    }

    button {
      padding: 10px 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>LIFF Debug</h1>
  <pre id="output">頁面已載入，等待 JS 執行...</pre>
  <button onclick="main()">手動重新測試</button>

  <script>
    const output = document.getElementById('output');

    function log(message) {
      output.textContent += '\n' + message;
    }

    function reset(message) {
      output.textContent = message;
    }

    window.onerror = function(message, source, lineno, colno, error) {
      log('window.onerror: ' + message);
      log('source: ' + source);
      log('line: ' + lineno + ':' + colno);
      if (error && error.stack) log(error.stack);
    };

    window.addEventListener('unhandledrejection', function(event) {
      log('unhandledrejection: ' + (event.reason && event.reason.message ? event.reason.message : String(event.reason)));
    });
  </script>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const LIFF_ID = '2010253113-y5SwOmBb';

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(message)), ms);
        })
      ]);
    }

    async function main() {
      reset('1. index.html 已執行');
      log('目前網址：' + location.href);
      log('LIFF_ID：' + LIFF_ID);

      try {
        if (!window.liff) {
          log('錯誤：LIFF SDK 沒有載入');
          return;
        }

        log('2. LIFF SDK 已載入');
        log('3. 開始 liff.init');

        await withTimeout(
          liff.init({ liffId: LIFF_ID }),
          15000,
          'liff.init 超過 15 秒沒有完成'
        );

        log('4. liff.init 成功');
        log('isInClient：' + liff.isInClient());
        log('isLoggedIn：' + liff.isLoggedIn());

        if (!liff.isLoggedIn()) {
          log('5. 尚未登入，準備 liff.login');
          liff.login();
          return;
        }

        log('5. 已登入，開始 getProfile');

        const profile = await withTimeout(
          liff.getProfile(),
          15000,
          'liff.getProfile 超過 15 秒沒有完成'
        );

        log('6. getProfile 成功');
        log(JSON.stringify({
          userId: profile.userId,
          displayName: profile.displayName,
          pictureUrl: profile.pictureUrl || ''
        }, null, 2));

      } catch (err) {
        log('ERROR：' + (err && err.message ? err.message : String(err)));
        if (err && err.stack) log(err.stack);
      }
    }

    main();
  </script>
</body>
</html>
